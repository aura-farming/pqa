name: invariant
# PQA-specific quality gate. Enforces the one architectural rule no branch may weaken
# (no verifier bypass), proves every hook still behaves, and validates the memory schema.
# Mutation testing is intentionally NOT here — see mutation.yml (label/schedule-triggered).
on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [main, develop]

concurrency:
  group: invariant-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verifier-invariant:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --dev --frozen
      - name: No code path may bypass the verifier
        run: uv run python scripts/check_invariant.py

  hook-smoke:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
      - name: Hooks behave (exit codes for safe/dangerous payloads)
        run: bash scripts/smoke_hooks.sh

  schema-valid:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
      - name: Memory schema loads cleanly
        run: sqlite3 "$(mktemp).db" < hooks/memory/schema.sql && echo "schema OK"
