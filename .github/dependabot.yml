# The real "always latest" mechanism: Dependabot opens PRs to bump deps and actions
# to their newest versions weekly. CI must stay green for any bump to merge.
version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
